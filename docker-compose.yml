version: "3.8"

services:
  app:
    build: .
    image: php:8.1-apache
    container_name: phpjot-app
    ports:
      - "80:80"
   # network_mode: host
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: phpjot-db
   # network_mode: host
    environment:
      MYSQL_DATABASE: ppes
      MYSQL_USER: ppes
      MYSQL_PASSWORD: admin@123
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./DATABASE:/docker-entrypoint-initdb.d
